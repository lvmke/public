<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Sports Timer</title>
  <style>
    :root {
      --bg: #121212;
      --bg-alt: #1e1e1e;
      --text: #e0e0e0;
      --text-dim: #b0b0b0;
      --work: #ff6b6b;
      --rest: #51cf66;
      --accent: #4dabf7;
      --border: #333;
    }
    body { 
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Arial, sans-serif; 
      background: var(--bg); 
      color: var(--text); 
      display: flex; 
      flex-direction: column; 
      align-items: center; 
      justify-content: center; 
      height: 100vh; 
      margin: 0; 
      padding: 20px; 
      box-sizing: border-box;
    }
    #display { 
      font-size: 6rem; 
      font-weight: 300; 
      font-variant-numeric: tabular-nums; 
      margin: 20px 0; 
      text-shadow: 0 0 20px currentColor;
      min-height: 1.2em;
    }
    .work { color: var(--work); }
    .rest { color: var(--rest); }
    #status { 
      font-size: 1.5rem; 
      color: var(--text-dim); 
      margin-bottom: 30px;
    }
    .controls { 
      display: flex; 
      flex-wrap: wrap; 
      gap: 15px; 
      justify-content: center; 
      max-width: 400px; 
      width: 100%;
    }
    label { 
      display: flex; 
      flex-direction: column; 
      font-size: 1.1rem; 
      color: var(--text-dim);
    }
    input[type="number"] { 
      background: var(--bg-alt); 
      border: 1px solid var(--border); 
      border-radius: 8px; 
      color: var(--text); 
      font-size: 1.2rem; 
      padding: 12px; 
      margin-top: 5px; 
      width: 120px; 
      text-align: center;
    }
    input:focus { outline: none; border-color: var(--accent); box-shadow: 0 0 0 2px rgba(77, 171, 247, 0.3); }
    button { 
      background: linear-gradient(145deg, var(--bg-alt), #2a2a2a); 
      border: 1px solid var(--border); 
      border-radius: 12px; 
      color: var(--text); 
      font-size: 1.1rem; 
      font-weight: 500; 
      padding: 12px 24px; 
      cursor: pointer; 
      transition: all 0.2s;
      min-width: 80px;
    }
    button:hover { background: var(--accent); color: var(--bg); border-color: var(--accent); transform: translateY(-1px); }
    button:active { transform: translateY(0); }
    @media (max-width: 600px) { 
      #display { font-size: 4rem; } 
      .controls { flex-direction: column; align-items: stretch; }
      input[type="number"], button { width: 100%; }
    }
  </style>
</head>
<body>
  <div class="controls">
    <label>Work
