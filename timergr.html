    <script>
        let interval, currentSet = 0, isSet = true;
        function startTimer() {
            const setTime = parseInt(document.getElementById('setTime').value) * 1000;
            const restTime = parseInt(document.getElementById('restTime').value) * 1000;
            const totalSets = parseInt(document.getElementById('sets').value);
            currentSet = 1;
            runTimer(setTime, true, totalSets, setTime, restTime);
        }
        function runTimer(time, isSetPhase, totalSets, setTime, restTime) {
            let remaining = time / 1000;
            document.getElementById('status').textContent = `Set ${currentSet} - ${isSetPhase ? 'Work' : 'Rest'}`;
            interval = setInterval(() => {
                remaining--;
                document.getElementById('timer').textContent = `${Math.floor(remaining / 60).toString().padStart(2, '0')}:${(remaining % 60).toString().padStart(2, '0')}`;
                if (remaining <= 0) {
                    clearInterval(interval);
                    playSound(isSetPhase ? 'setSound' : 'restSound');
                    if (isSetPhase) {
                        if (currentSet < totalSets) runTimer(restTime, false, totalSets, setTime, restTime);
                        else alert('Workout complete!');
                    } else {
                        currentSet++;
                        runTimer(setTime, true, totalSets, setTime, restTime);
                    }
                }
            }, 1000);
        }
        function playSound(id) { document.getElementById(id).play(); }
    </script>
